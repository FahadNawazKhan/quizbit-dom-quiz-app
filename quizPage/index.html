<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizBit</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">
        <div id="qnsleft">
            <button id="q1" class="q"></button>
            <button id="q2" class="q"></button>
            <button id="q3" class="q"></button>
            <button id="q4" class="q"></button>
            <button id="q5" class="q"></button>
        </div>
        <p id="question">Who is the best footballer in the world?</p>
        <div id="options">
            <button id="option1" class="option">option1</button>
            <button id="option2" class="option">option2</button>
            <button id="option3" class="option">option3</button>
            <button id="option4" class="option">option4</button>
        </div>
        <button id="submit">SUBMIT</button>

    </div>
</body>
<script src="script.js"></script>

</html>
